# HomeDash configuration
# Place this file at ~/.config/homedash/config.yaml
#
# All fields are optional — sensible defaults are used when omitted.
# Unknown fields are rejected (catches typos).

# Color theme: tokyo-night (default), catppuccin, dracula
theme: tokyo-night

# System metrics configuration
system:
  # Disk mounts to monitor
  # Each entry needs an absolute path; label is optional (defaults to path)
  disks:
    - path: /
      label: /
    - path: /mnt/data
      label: /data

# Data refresh intervals (Go duration strings: "2s", "5m", etc.)
# Minimums enforced: system >= 1s, docker >= 3s, weather >= 1m
refresh:
  system: 2s
  docker: 5s
  weather: 5m

# Docker connection
# Can also be set via DOCKER_HOST environment variable (takes precedence)
docker:
  host: unix:///var/run/docker.sock
